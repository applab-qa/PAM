  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;\n  src: url(\"3f0af7d2-e254-4a4c-97de-4c2db79ef303\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Onest';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"45aaff96-bae6-476b-9f12-2ddfc2a4da77\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\n:root{\n  --navy:#0a1628;--navy-900:#0d2150;--navy-800:#102566;--navy-700:#1a3a8f;\n  --gold:#b89249;--gold-l:#c9a567;--gold-xl:#e7d7ae;--gold-bg:#f6ecd2;\n  --cream:#faf7f0;--cream-card:#f4f0e6;--cream-line:#e5dece;\n  --txt:#0a1628;--txt-2:#4a5568;--txt-3:#8896ab;\n  --white:#fff;--red:#b61e33;--green:#0e7a45;\n  --teal:#0e7a45;\n  --r-sm:12px;--r-md:18px;--r-lg:24px;--r-xl:32px;\n}\nbody{\n  font-family:'Noto Kufi Arabic',sans-serif;background:var(--cream);color:var(--txt);\n  line-height:1.55;direction:rtl;padding:0;min-height:100vh;\n}\n.num{font-family:'Onest',sans-serif;font-feature-settings:\"tnum\"}\n\n/* ── PAGE FRAME ─────────────────────────────────────── */\n.wrap{max-width:1280px;margin:0 auto;padding:0 32px}\n\n/* ── PAGE HEADER (light) ─────────────────────────────────────── */\n.page-section{\n  position:relative;background:var(--cream);\n  padding:18px 0 0;\n}\n.hero-dark{\n  position:relative;overflow:hidden;\n  background:var(--navy);display:none;\n  color:#fff;\n  padding:28px 0 36px;\n}\n/* gold accent line spanning the hero, dots at each end */\n.hero-rule{\n  position:relative;height:2px;\n  background:linear-gradient(to right,transparent,var(--gold) 8%,var(--gold) 92%,transparent);\n  margin:0 32px 28px;border-radius:1px;opacity:.55;\n}\n.hero-rule::before,.hero-rule::after{\n  content:'';position:absolute;top:50%;width:8px;height:8px;border-radius:50%;\n  background:var(--gold);transform:translateY(-50%);\n}\n.hero-rule::before{right:0}\n.hero-rule::after{left:0}\n/* decorative concentric rings — visually on the LEFT in RTL */\n.hero-rings{\n  position:absolute;top:50%;left:-160px;transform:translateY(-50%);\n  width:520px;height:520px;pointer-events:none;opacity:.5;\n}\n.hero-rings .ring{position:absolute;border-radius:50%;border:1.5px solid rgba(184,146,73,.18)}\n.hero-rings .ring.r1{inset:0}\n.hero-rings .ring.r2{inset:60px;border-color:rgba(184,146,73,.28)}\n.hero-rings .ring.r3{inset:120px;border-color:rgba(184,146,73,.42)}\n.hero-rings .ring.r4{inset:180px;border-color:rgba(231,215,174,.55)}\n.hero-rings .dot{position:absolute;width:10px;height:10px;border-radius:50%;background:var(--gold-xl);box-shadow:0 0 0 4px rgba(184,146,73,.18)}\n.hero-rings .dot.d1{top:8%;right:34%}\n.hero-rings .dot.d2{bottom:14%;left:20%;width:6px;height:6px}\n.hero-glow{\n  position:absolute;top:-200px;right:-160px;width:520px;height:520px;\n  background:radial-gradient(circle,rgba(184,146,73,.18) 0%,transparent 60%);\n  pointer-events:none;\n}\n\n/* breadcrumb */\n.crumb{\n  display:flex;align-items:center;gap:10px;\n  font-size:11px;color:var(--txt-3);margin-bottom:8px;\n  font-weight:500;\n}\n.crumb a{color:var(--txt-3);text-decoration:none;transition:color .15s}\n.crumb a:hover{color:var(--navy)}\n.crumb-sep{color:var(--cream-line)}\n\n/* ── PAGE HEADER ─────────────────────────────────────── */\n.page-head{\n  display:flex;align-items:flex-end;justify-content:space-between;\n  gap:32px;margin-bottom:12px;flex-wrap:wrap;position:relative;z-index:1;\n}\n.page-head-text{max-width:680px}\n.section-label{\n  display:inline-flex;align-items:center;gap:6px;margin-bottom:8px;\n  font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;\n  color:var(--gold-xl);background:rgba(184,146,73,.12);border:1px solid rgba(184,146,73,.3);\n  border-radius:999px;padding:5px 12px;\n}\n.section-label::before{content:'✦';font-size:8px}\n.page-title{\n  font-size:clamp(20px,2vw,26px);font-weight:800;color:var(--navy);\n  line-height:1.2;margin-bottom:4px;letter-spacing:-.01em;\n}\n.page-title .gold{color:var(--gold)}\n.page-sub{font-size:11.5px;color:var(--txt-2);line-height:1.45;max-width:620px;margin:0}\n\n/* small gold rule under sub */\n.page-sub-line{\n  display:flex;align-items:center;gap:10px;margin-top:18px;\n}\n.page-sub-line::after{content:'';width:120px;height:1px;background:linear-gradient(to left,transparent,var(--gold))}\n.page-sub-line span{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0}\n\n/* Period chip (dark hero variant) */\n.period-chip{\n  display:inline-flex;align-items:center;gap:8px;\n  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);\n  padding:7px 14px;border-radius:999px;font-size:12px;color:rgba(255,255,255,.7);\n  margin-top:18px;backdrop-filter:blur(8px);\n}\n.period-chip-dot{width:6px;height:6px;border-radius:50%;background:#3bb55e;box-shadow:0 0 0 3px rgba(59,181,94,.2)}\n.period-chip strong{color:var(--gold-xl);font-weight:700}\n\n/* ── FILTER BAR (light, sits below dark hero) ─────────────────────────────────────── */\n.filter-bar{\n  background:var(--white);border:1px solid var(--cream-line);\n  border-radius:var(--r-lg);padding:6px 12px;\n  display:flex;align-items:center;gap:14px;flex-wrap:wrap;\n  margin-bottom:18px;\n  box-shadow:0 8px 24px -16px rgba(10,22,40,.18);\n}\n.filter-label{\n  display:flex;align-items:center;gap:6px;\n  font-size:10.5px;color:var(--txt-2);font-weight:600;\n  padding-inline-end:10px;border-inline-end:1px solid var(--cream-line);\n}\n.filter-label svg{color:var(--gold)}\n.filter-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap}\n.filter-pill{\n  display:inline-flex;align-items:center;gap:4px;\n  padding:3px 9px;border-radius:999px;\n  font-family:inherit;font-size:10.5px;font-weight:600;\n  background:var(--cream);border:1px solid var(--cream-line);\n  color:var(--txt-2);cursor:pointer;transition:all .15s;\n  position:relative;\n}\n.filter-pill:hover{border-color:var(--gold-l);color:var(--navy)}\n.filter-pill.active{background:var(--navy);border-color:var(--navy);color:var(--white)}\n.filter-pill.active .filter-dot{background:var(--gold-xl)}\n.filter-dot{width:5px;height:5px;border-radius:50%;background:var(--gold)}\n.filter-divider{width:1px;height:16px;background:var(--cream-line);margin:0 2px}\n.filter-spacer{flex:1}\n.filter-meta{\n  font-size:10.5px;color:var(--txt-3);display:flex;align-items:center;gap:6px;\n}\n.filter-meta .num{color:var(--navy);font-weight:700;font-size:11px}\n\n/* Year dropdown */\n.filter-dd{position:relative}\n.filter-dd-btn{\n  display:inline-flex;align-items:center;gap:6px;\n  padding:3px 9px 3px 11px;border-radius:999px;\n  font-family:inherit;font-size:12.5px;font-weight:600;\n  background:transparent;border:1px solid var(--cream-line);\n  color:var(--navy);cursor:pointer;transition:all .15s;\n  min-width:100px;justify-content:space-between;\n}\n.filter-dd-btn:hover{border-color:var(--navy);background:var(--cream)}\n.filter-dd-btn .dd-label{display:inline-flex;align-items:center;gap:5px;color:var(--txt-3);font-size:10px;font-weight:500}\n.filter-dd-btn .dd-value{font-family:'Onest',sans-serif;color:var(--navy);font-weight:700;font-size:11px}\n.filter-dd-btn .dd-caret{transition:transform .18s;color:var(--gold);font-size:10px;margin-inline-start:auto}\n.filter-dd.open .dd-caret{transform:rotate(180deg)}\n.filter-dd-menu{\n  position:absolute;top:calc(100% + 6px);inset-inline-end:0;z-index:20;\n  background:var(--white);border:1px solid var(--cream-line);\n  border-radius:14px;padding:6px;min-width:160px;\n  box-shadow:0 16px 40px -12px rgba(10,22,40,.25);\n  display:none;flex-direction:column;gap:2px;\n  animation:ddpop .18s ease-out;\n}\n.filter-dd.open .filter-dd-menu{display:flex}\n@keyframes ddpop{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}\n.filter-dd-item{\n  display:flex;align-items:center;justify-content:space-between;gap:8px;\n  padding:8px 12px;border-radius:8px;cursor:pointer;\n  font-size:12.5px;color:var(--txt);font-weight:600;\n  font-family:inherit;background:transparent;border:0;text-align:start;\n}\n.filter-dd-item .v{font-family:'Onest',sans-serif}\n.filter-dd-item:hover{background:var(--cream)}\n.filter-dd-item.active{background:var(--cream-card);color:var(--navy)}\n.filter-dd-item.active::before{content:'✓';color:var(--gold);font-weight:800}\n.filter-dd-item .meta{font-size:10.5px;color:var(--txt-3);font-weight:500;margin-inline-start:auto;font-family:'Noto Kufi Arabic'}\n\n/* Content area below the header */\n.content-area{padding:0 0 14px;position:relative;z-index:1}\n\n/* ── DARK SIDEBAR (reports menu) ─────────────────────────────────────── */\n.app-shell{display:flex;align-items:stretch;min-height:100vh;background:var(--cream)}\n.side-nav{\n  width:240px;background:var(--navy);color:#fff;flex-shrink:0;\n  position:sticky;top:0;align-self:flex-start;height:100vh;\n  display:flex;flex-direction:column;\n  border-inline-start:1px solid rgba(255,255,255,.06);\n  transition:width .28s cubic-bezier(.4,.2,.2,1);\n  overflow:hidden;\n}\n.side-nav.collapsed{width:64px}\n.side-head{\n  display:flex;align-items:center;gap:10px;\n  padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.07);\n  flex-shrink:0;min-height:64px;\n}\n.side-logo{\n  width:32px;height:32px;border-radius:50%;\n  background:var(--gold-xl);display:grid;place-items:center;flex-shrink:0;\n}\n.side-logo svg{width:18px;height:18px;fill:var(--navy)}\n.side-head-text{flex:1;min-width:0;overflow:hidden;white-space:nowrap}\n.side-head-ar{font-size:12px;font-weight:700;color:#fff;line-height:1.25}\n.side-head-en{font-size:9.5px;font-family:'Onest',sans-serif;color:rgba(255,255, Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- foot -->\n  <div class=\"foot\">\n    <div class=\"foot-left\">\n      <span>© 2025 الهيئة العامة للقوى العاملة — دولة الكويت<\u002Fspan>\n      <span class=\"foot-badge\">v 2.4<\u002Fspan>\n    <\u002Fdiv>\n    <div>\n      آخر تحديث للبيانات: <span class=\"num\" style=\"color:var(--navy);font-weight:700\">15 ديسمبر 2024<\u002Fspan>\n      <span style=\"color:var(--cream-line);margin:0 6px\">·<\u002Fspan>\n      <a href=\"#\">منهجية القياس ↗<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<script src=\"229b8021-b330-46b0-9b76-73a4f1929788\"><\u002Fscript>\n<script>\n/* ── Palette aligned with IPAM portal ─────────────────────────── */\nconst NAVY='#0a1628',NAVY_700='#1a3a8f',NAVY_800='#102566',NAVY_900='#0d2150';\nconst GOLD='#b89249',GOLD_L='#c9a567',GOLD_XL='#e7d7ae',GOLD_BG='#f6ecd2';\nconst CREAM_LINE='#e5dece',TXT_2='#4a5568',TXT_3='#8896ab';\n\n/* Data preserved from the original */\nconst DATA={\n  2024:{total:28540,male:12180,female:16360,rate:38.4,\n    qual:{labels:['دكتوراه','ماجستير','بكالوريوس','دبلوم','ثانوية','أقل من ثانوية'],male:[320,890,4200,2100,3800,870],female:[210,1100,6800,3200,4100,950]},\n    status:{male:[4800,7380],female:[6160,10200]},\n    months:{labels:['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'],male:[980,860,920,1100,1050,890,760,820,1040,1120,980,860],female:[1200,1050,1180,1320,1280,1100,950,1020,1250,1380,1200,1030]}\n  },\n  2023:{total:26860,male:11400,female:15460,rate:36.3,\n    qual:{labels:['دكتوراه','ماجستير','بكالوريوس','دبلوم','ثانوية','أقل من ثانوية'],male:[290,820,3900,1980,3600,810],female:[190,1020,6300,3000,3900,870]},\n    status:{male:[4200,7200],female:[5700,9760]},\n    months:{labels:['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'],male:[900,820,860,1020,980,840,720,780,980,1050,920,810],female:[1100,960,1080,1200,1180,1010,880,940,1150,1280,1100,940]}\n  },\n  2022:{total:24100,male:10200,female:13900,rate:34.1,\n    qual:{labels:['دكتوراه','ماجستير','بكالوريوس','دبلوم','ثانوية','أقل من ثانوية'],male:[260,740,3500,1780,3200,720],female:[170,920,5600,2700,3500,780]},\n    status:{male:[3700,6500],female:[5100,8800]},\n    months:{labels:['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'],male:[810,740,780,920,880,760,650,700,880,950,830,720],female:[980,860,970,1080,1060,910,790,840,1030,1150,990,840]}\n  }\n};\n\nconst filters={year:'2024',gender:'all',status:'all'};\nlet charts={};\n\n/* Filter pill behaviour */\ndocument.querySelectorAll('.filter-group').forEach(group=>{\n  const key=group.dataset.filter;\n  group.querySelectorAll('.filter-pill').forEach(btn=>{\n    btn.addEventListener('click',()=>{\n      group.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));\n      btn.classList.add('active');\n      // sync filter-dot for the newly active\n      group.querySelectorAll('.filter-pill').forEach(b=>{\n        const existing=b.querySelector('.filter-dot');\n        if(b.classList.contains('active')){\n          if(!existing){\n            const d=document.createElement('span');d.className='filter-dot';b.insertBefore(d,b.firstChild);\n          }\n        } else if(existing){ existing.remove(); }\n      });\n      filters[key]=btn.dataset.value;\n      updateAll();\n    });\n  });\n});\n\n/* Year dropdown */\nconst yearDD=document.getElementById('yearDD');\nconst yearDDBtn=document.getElementById('yearDDBtn');\nconst yearDDMenu=document.getElementById('yearDDMenu');\nconst yearDDVal=document.getElementById('yearDDVal');\nyearDDBtn.addEventListener('click',e=>{\n  e.stopPropagation();\n  const open=yearDD.classList.toggle('open');\n  yearDDBtn.setAttribute('aria-expanded',open?'true':'false');\n});\nyearDDMenu.querySelectorAll('.filter-dd-item').forEach(item=>{\n  item.addEventListener('click',()=>{\n    yearDDMenu.querySelectorAll('.filter-dd-item').forEach(i=>i.classList.remove('active'));\n    item.classList.add('active');\n    const val=item.dataset.value;\n    yearDDVal.textContent=val;\n    yearDD.classList.remove('open');\n    yearDDBtn.setAttribute('aria-expanded','false');\n    filters.year=val;\n    updateAll();\n  });\n});\ndocument.addEventListener('click',e=>{\n  if(!yearDD.contains(e.target)){yearDD.classList.remove('open');yearDDBtn.setAttribute('aria-expanded','false');}\n});\ndocument.addEventListener('keydown',e=>{\n  if(e.key==='Escape'){yearDD.classList.remove('open');yearDDBtn.setAttribute('aria-expanded','false');}\n});\n\nfunction tooltipCfg(dark){\n  return {\n    rtl:true,titleAlign:'right',bodyAlign:'right',\n    backgroundColor:dark?'#fff':NAVY,\n    titleColor:dark?NAVY:'#fff',\n    bodyColor:dark?TXT_2:'rgba(255,255,255,.85)',\n    borderColor:dark?CREAM_LINE:'transparent',\n    borderWidth:dark?1:0,\n    padding:12,cornerRadius:10,\n    titleFont:{family:'Noto Kufi Arabic',size:12,weight:'700'},\n    bodyFont:{family:'Noto Kufi Arabic',size:12},\n    boxPadding:6,\n  };\n}\n\nfunction buildCharts(d,gender,status){\n  let qM=[...d.qual.male],qF=[...d.qual.female];\n  let sM=[...d.status.male],sF=[...d.status.female];\n  let tM=[...d.months.male],tF=[...d.months.female];\n\n  if(gender==='male'){qF=qF.map(()=>0);sF=[0,0];tF=tF.map(()=>0);}\n  if(gender==='female'){qM=qM.map(()=>0);sM=[0,0];tM=tM.map(()=>0);}\n  if(status==='employed'){sM=[sM[0],0];sF=[sF[0],0];}\n  if(status==='unemployed'){sM=[0,sM[1]];sF=[0,sF[1]];}\n\n  Object.values(charts).forEach(c=>c&&c.destroy());\n  charts={};\n\n  const tickFont={family:'Noto Kufi Arabic',size:11};\n  const tickNum={family:'Onest',size:10};\n  const grid='rgba(10,22,40,.06)';\n  const gridDark='rgba(255,255,255,.07)';\n\n  /* Trend (line) ── dark navy card */\n  const tTotal=tM.map((v,i)=>v+tF[i]);\n  charts.trend=new Chart(document.getElementById('chartTrend'),{\n    type:'line',\n    data:{\n      labels:d.months.labels,\n      datasets:[\n        {label:'إناث',data:tF,borderColor:GOLD,backgroundColor:'rgba(184,146,73,.18)',tension:.4,pointRadius:0,pointHoverRadius:5,pointBackgroundColor:GOLD,pointBorderColor:'#fff',pointBorderWidth:2,fill:true,borderWidth:2},\n        {label:'ذكور',data:tM,borderColor:GOLD_XL,backgroundColor:'rgba(231,215,174,.1)',tension:.4,pointRadius:0,pointHoverRadius:5,pointBackgroundColor:GOLD_XL,pointBorderColor:NAVY,pointBorderWidth:2,fill:true,borderWidth:2},\n        {label:'الإجمالي',data:tTotal,borderColor:'#7da3ff',borderDash:[6,5],tension:.4,pointRadius:0,pointHoverRadius:5,pointBackgroundColor:'#7da3ff',pointBorderColor:'#fff',pointBorderWidth:2,fill:false,borderWidth:2}\n      ]\n    },\n    options:{\n      responsive:true,maintainAspectRatio:false,\n      interaction:{mode:'index',intersect:false},\n      plugins:{legend:{display:false},tooltip:tooltipCfg(true)},\n      scales:{\n        x:{ticks:{font:tickFont,color:'rgba(255,255,255,.55)'},grid:{color:gridDark,drawTicks:false},reverse:true,border:{display:false}},\n        y:{ticks:{font:tickNum,color:'rgba(255,255,255,.45)',padding:8},grid:{color:gridDark,drawTicks:false},border:{display:false},beginAtZero:true}\n      }\n    }\n  });\n\n  /* Trend summary strip values */\n  const maxIdx=tTotal.indexOf(Math.max(...tTotal));\n  const minIdx=tTotal.indexOf(Math.min(...tTotal));\n  document.getElementById('tHi').textContent=tTotal[maxIdx].toLocaleString();\n  document.getElementById('tHiLbl').textContent=d.months.labels[maxIdx];\n  document.getElementById('tLo').textContent=tTotal[minIdx].toLocaleString();\n  document.getElementById('tLoLbl').textContent=d.months.labels[minIdx];\n  const avg=Math.round(tTotal.reduce((a,b)=>a+b,0)/12);\n  document.getElementById('tAvg').textContent=avg.toLocaleString();\n  const q1=tTotal.slice(0,3).reduce((a,b)=>a+b,0);\n  const q4=tTotal.slice(9,12).reduce((a,b)=>a+b,0);\n  const grow=q1>0?((q4-q1)/q1*100):0;\n  document.getElementById('tGrow').textContent=(grow>=0?'+':'')+grow.toFixed(1)+'%';\n\n  /* Qualifications horizontal bars */\n  charts.qual=new Chart(document.getElementById('chartQual'),{\n    type:'bar',\n    data:{\n      labels:d.qual.labels,\n      datasets:[\n        {label:'ذكور',data:qM,backgroundColor:NAVY_700,borderRadius:4,maxBarThickness:9},\n        {label:'إناث',data:qF,backgroundColor:GOLD,borderRadius:4,maxBarThickness:9}\n      ]\n    },\n    options:{\n      indexAxis:'y',responsive:true,maintainAspectRatio:false,\n      plugins:{legend:{display:false},tooltip:tooltipCfg(false)},\n      scales:{\n        x:{position:'top',ticks:{font:tickNum,color:TXT_3,padding:6},grid:{color:grid,drawTicks:false},border:{display:false},beginAtZero:true},\n        y:{ticks:{font:tickFont,color:NAVY,padding:8},grid:{display:false},border:{display:false}}\n      }\n    }\n  });\n\n  /* Employment status (stacked vertical) */\n  charts.status=new Chart(document.getElementById('chartStatus'),{\n    type:'bar',\n    data:{\n      labels:['ذكور','إناث'],\n      datasets:[\n        {label:'موظف',data:[sM[0],sF[0]],backgroundColor:NAVY_700,borderRadius:6,maxBarThickness:72,stack:'s'},\n        {label:'غير موظف',data:[sM[1],sF[1]],backgroundColor:GOLD,borderRadius:6,maxBarThickness:72,stack:'s'}\n      ]\n    },\n    options:{\n      responsive:true,maintainAspectRatio:false,\n      plugins:{\n        legend:{display:false},\n        tooltip:tooltipCfg(false),\n      },\n      scales:{\n        x:{stacked:true,ticks:{font:{family:'Noto Kufi Arabic',size:13,weight:'700'},color:NAVY,padding:8},grid:{display:false},border:{display:false}},\n        y:{stacked:true,ticks:{font:tickNum,color:TXT_3,padding:8},grid:{color:grid,drawTicks:false},border:{display:false},beginAtZero:true}\n      }\n    }\n  });\n\n  /* Gender donut */\n  const totalM=gender==='female'?0:d.male;\n  const totalF=gender==='male'?0:d.female;\n  charts.gender=new Chart(document.getElementById('chartGender'),{\n    type:'doughnut',\n    data:{\n      labels:['ذكور','إناث'],\n      datasets:[{\n        data:[totalM,totalF],\n        backgroundColor:[NAVY_700,GOLD],\n        borderWidth:4,borderColor:'#fff',hoverOffset:6\n      }]\n    },\n    options:{\n      responsive:true,maintainAspectRatio:false,cutout:'72%',\n      plugins:{legend:{display:false},tooltip:tooltipCfg(false)}\n    }\n  });\n\n  /* Donut legend numbers */\n  const totG=totalM+totalF;\n  document.getElementById('gCenter').textContent=totG.toLocaleString();\n  document.getElementById('gMalePct').textContent=totG?Math.round(totalM/totG*100*10)/10+'%':'—';\n  document.getElementById('gFemalePct').textContent=totG?Math.round(totalF/totG*100*10)/10+'%':'—';\n  document.getElementById('gMaleCount').textContent=totalM.toLocaleString();\n  document.getElementById('gFemaleCount').textContent=totalF.toLocaleString();\n\n  /* Top qualifications donut */\n  const totals=d.qual.labels.map((lbl,i)=>({lbl,val:(qM[i]||0)+(qF[i]||0)}));\n  totals.sort((a,b)=>b.val-a.val);\n  const top4=totals.slice(0,4);\n  const grandTotal=totals.reduce((a,b)=>a+b.val,0)||1;\n  const TOP_COLORS=[GOLD,NAVY_700,GOLD_L,'#5b6b85'];\n\n  charts.top=new Chart(document.getElementById('chartTop'),{\n    type:'doughnut',\n    data:{\n      labels:top4.map(x=>x.lbl),\n      datasets:[{\n        data:top4.map(x=>x.val),\n        backgroundColor:TOP_COLORS,\n        borderWidth:4,borderColor:'#fff',hoverOffset:6\n      }]\n    },\n    options:{\n      responsive:true,maintainAspectRatio:false,cutout:'72%',\n      plugins:{legend:{display:false},tooltip:tooltipCfg(false)}\n    }\n  });\n\n  /* center: top-1 label */\n  document.getElementById('tCenter').textContent=top4[0]?top4[0].lbl:'—';\n\n  /* legend rows */\n  document.getElementById('topLegend').innerHTML=top4.map((x,i)=>{\n    const pct=Math.round(x.val/grandTotal*100*10)/10;\n    const justify = i%2===0 ? 'flex-start' : 'flex-end';\n    return `\n      <div class=\"donut-leg-row\" style=\"justify-content:${justify}\">\n        <div class=\"donut-leg-left\" title=\"${x.lbl}\"><span class=\"donut-leg-dot\" style=\"background:${TOP_COLORS[i]}\"><\u002Fspan><span>${x.lbl}<\u002Fspan><\u002Fdiv>\n        <div class=\"donut-leg-right\">\n          <span class=\"donut-leg-pct\">${pct}%<\u002Fspan>\n          <span class=\"donut-leg-count\">${x.val.toLocaleString()}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n  }).join('');\n}\n\nfunction updateMetrics(d,gender){\n  const m=gender==='female'?0:d.male;\n  const f=gender==='male'?0:d.female;\n  const t=m+f;\n  document.getElementById('mTotal').textContent=t.toLocaleString();\n  document.getElementById('mMale').textContent=m.toLocaleString();\n  document.getElementById('mFemale').textContent=f.toLocaleString();\n  document.getElementById('mMalePct').textContent=t>0?Math.round(m/t*100*10)/10+'%':'—';\n  document.getElementById('mFemalePct').textContent=t>0?Math.round(f/t*100*10)/10+'%':'—';\n  document.getElementById('mRate').textContent=d.rate.toFixed(1)+'%';\n  document.getElementById('fCount').textContent=t.toLocaleString();\n}\n\nfunction updateAll(){\n  const d=DATA[filters.year];\n  updateMetrics(d,filters.gender);\n  buildCharts(d,filters.gender,filters.status);\n}\n\nupdateAll();\n\n/* ── Sidebar toggle ─────────────────────── */\n(function(){\n  const nav=document.getElementById('sideNav');\n  const btn=document.getElementById('sideToggle');\n  if(btn) btn.addEventListener('click',()=>nav.classList.toggle('collapsed'));\n  document.querySelectorAll('.side-link').forEach(a=>{\n    a.addEventListener('click',e=>{\n      e.preventDefault();\n      document.querySelectorAll('.side-link').forEach(x=>x.classList.remove('active'));\n      a.classList.add('active');\n    });\n  });\n})();\n<\u002Fscript>\n<\u002Fdiv><!-- /app-main -->\n<\u002Fdiv><!-- /app-shell -->\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
